<!DOCTYPE html>
<html>
<head>
  <title>chatApp</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="board-container">

<h1 id="boardTitle"></h1>

<!-- 🟢 viimeksi paikalla -->
<div id="visitedUsers" class="visited-users"></div>

<div class="board-actions">
   <button id="topicBtn" onclick="openTopicPopup()"> New Topic </button>
   <div id="noticeControls" class="topic-selects">
     
        <select id="categorySelect" onchange="changeCategory()">
            <option value="general">General</option>
            <option value="maintenance">Maintenance</option>
            <option value="meetings">Meetings</option>
            <option value="events">Events</option>
        </select>

        <select id="topicSelect">
            <option value="">Select Topic</option>
        </select>

    </div>
  <button class="clear-btn" onclick="clearTable()">Clear</button>
</div>

<!-- viestit -->
<div class="board">
  <div id="boardMessagesDiv"></div>
</div>
  <div class="message-options">
    <label>
      <input type="checkbox" id="importantMode">
      Important
    </label>
    <label>
      <input type="checkbox" id="infoMode">
      Info
    </label>
    <label>
      <input type="checkbox" id="todayMode">
      Today
    </label>
    <label>
      <input type="checkbox" id="editMode">
      Edit
    </label>
  </div>

  <!-- viesti -->
  <div class="message-area">

  <span id="quickMessagesBtn" onclick="openQuickMessages()">
    💬
  </span>
    <div class="input-row">
      <input id="boardNewMsg" placeholder="Write message">
     <button id="sendBtn" class="send-btn" onclick="updateMessage()">
      Send
     </button>
    </div>
  </div>
</div>

<button id="menuBtn">☰</button>
<div id="topMenu">
  <button onclick="showMembers()"> Members </button>
  <button id="requestsBtn" onclick="openRequests()"> Requests </button>
  <button id="deleteBoardBtn" onclick="deleteBoard()">Delete Board</button>
  <button id="leaveBoardBtn" onclick="leaveBoard()"> Leave Board </button>
  <button id="settingsBtn" onclick="openSettings()"> Settings </button>
  <button onclick="logout()"> Logout </button>
</div>

<div id="membersPopup" class="popup">
  <div class="popup-content">
    <h3>Members:</h3>
    <div id="membersList"></div>
    <br>
    <button onclick="closeMembers()">Sulje</button>
  </div>
</div>

<div id="settingsPopup" class="popup">
  <div class="popup-content">
    <h3>Asetukset</h3>
    <label>
      Poista viestit vanhempina kuin
    </label>
    <input
      id="autoDeleteDays"
      type="number"
      min="1"
      max="365"
    >
    <span>päivää</span>
    <br><br>
    <button onclick="saveSettings()">
      Tallenna
    </button>
    <button onclick="closeSettings()">
      Sulje
    </button>
  </div>
</div>

<div id="requestsPopup" class="popup">
  <div class="popup-content">
    <h3>Join Requests</h3>
    <div id="requestsList"></div>
    <br>
    <button onclick="closeRequests()">Sulje</button>
  </div>
</div>

<div id="quickMessagesPopup" class="popup">
  <div class="popup-content">
    <h3>Quick Messages</h3>
    <div id="quickMessagesList"></div>
    <br>
    <button id="saveQuickBtn" onclick="saveQuickMessages()"> Save </button>
    <button onclick="closeQuickMessages()"> Close </button>
  </div>
</div>

<div id="createTopicPopup" class="popup">
  <div class="popup-content">
    <h3>Create New Topic</h3>

    <select id="cp_category">
      <option value="general">General</option>
      <option value="maintenance">Maintenance</option>
      <option value="meetings">Meetings</option>
      <option value="events">Events</option>
    </select>
    <input id="cp_topic" placeholder="Topic">
    
<textarea id="cp_message"
          placeholder="Write your message..."
          rows="5"></textarea>

    <button onclick="submitTopic()">Create</button>
    <button onclick="closeTopicPopup()">Cancel</button>
  </div>
</div>

<script src="app.js?v=3"></script>

</body>
</html>
