<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-nav">

  <button onclick="openJoinBoard()">Join Board</button>
  <button onclick="openCreatePopup()">Create Board</button>
</div>

<div id="boardCount">Boards: ...</div>

<div class="login-box">
  <h2>Board Login</h2>

  <form onsubmit="loginWithPassword(); return false;">
    <input id="boardName" placeholder="Board Name">
    <input id="boardUsername" placeholder="Username">
    <input id="boardPassword" type="password" placeholder="Password">
    <button type="submit">Open Board</button>
  </form>
</div>

<div id="createPopup" class="popup">
  <div class="popup-content">
    <h3>Create Board</h3>

    <label for="cp_boardType">Board Type</label>
    <select id="cp_boardType">
      <option value="family">Family</option>
      <option value="notice">Notice</option>
    </select>

    <input id="cp_boardName" placeholder="Board Name">
    <input id="cp_username" placeholder="Username">
    <input id="cp_boardPassword" placeholder="Board Password" type="password">
    <input id="cp_email" placeholder="Email">
    <button onclick="submitCreateBoard()">Create</button>
    <button onclick="closeCreatePopup()">Cancel</button>
  </div>
</div>

<div id="joinBoardPopup" class="popup">
  <div class="popup-content">
    <h3>Join Board</h3>
  <input id="joinBoardName" placeholder="Board Name">

<input id="joinUsername" placeholder="Username">

<input id="joinPassword" type="password" placeholder="Password">

<input id="joinEmail" type="email" placeholder="Email">
    <br>
    <button onclick="sendJoinRequest()"> Send Request </button>

    <button onclick="closeJoinBoard()"> Cancel </button>
  </div>
</div>

<script src="app.js?v=4"></script>

</body>
</html>
